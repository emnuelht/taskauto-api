spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: TaskAuto

  datasource:
    url: jdbc:postgresql://localhost:5432/taskautodb
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: ${OLLAMA_IA}
        options:
          format: json

app:
  cors:
    allowed-origins: http://localhost:5173

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui
    url: /api-docs
    disable-swagger-default-url: true
